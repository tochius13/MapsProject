<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSUN Campus Map Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <!-- Difficulty overlay -->
    <div id="difficulty-screen">
        <div id="diff-box">
            <div id="diff-logo">🗺️</div>
            <h1>CSUN Campus Quiz</h1>
            <p>Choose a difficulty</p>
            <div id="diff-buttons">
                <button class="diff-btn" onclick="selectDifficulty('easy')">🟢 <strong>Easy</strong> — 2 hints, +5s each</button>
                <button class="diff-btn" onclick="selectDifficulty('medium')">🟡 <strong>Medium</strong> — 1 hint, +10s</button>
                <button class="diff-btn" onclick="selectDifficulty('hard')">🔴 <strong>Hard</strong> — No hints, shuffled</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
        <div id="diff-badge"></div>
        <h2>Double-click the location of:</h2>
        <div id="question-list"></div>
        <button id="hint-btn" style="display:none;">💡 Hint</button>
        <div id="progress-wrap"><div id="progress-bar"></div></div>
        <div id="stats-bar">
            <div class="stat-row">⏱ Time: <span id="timer">0</span>s</div>
            <div class="stat-row">🏆 Best: <span id="high-score-val">--</span>s</div>
            <div id="streak-display" style="display:none;"></div>
        </div>
        <div id="new-hs-badge">🏆 NEW BEST TIME!</div>
        <div id="score-display"></div>
        <button id="restart-btn">▶ Play Again</button>
        <div id="instructions">Double-click the map to guess · 5 rounds · Panning disabled</div>
    </div>

    <div id="map"></div>

    <script src="locations.js"></script>
    <script src="app.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyATX1BrKnReb-t9wyN6IJe_a_2O36S70Mo&callback=initMap"></script>
</body>
</html>
